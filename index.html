<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Ferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(-45deg, #1e3a8a, #4338ca, #111827, #030712); background-size: 400% 400%; animation: grad 15s ease infinite; }
        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-gray-900">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black text-white tracking-tighter mb-4">Central de Ferramentas</h1>
        <p id="data-hora-main" class="text-indigo-300 font-bold uppercase tracking-widest text-xs"></p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
        <a href="Exercício 1/exercicio1.html" class="bg-white/90 p-8 rounded-[2rem] shadow-2xl hover:scale-105 transition-all text-center">
            <h3 class="text-xl font-bold mb-2">Horas Extras</h3>
            <span class="text-blue-600 font-bold text-sm uppercase">Abrir Módulo →</span>
        </a>
        <a href="Exercício 2/exercicio2.html" class="bg-white/90 p-8 rounded-[2rem] shadow-2xl hover:scale-105 transition-all text-center">
            <h3 class="text-xl font-bold mb-2">Reajuste Salarial</h3>
            <span class="text-emerald-600 font-bold text-sm uppercase">Abrir Módulo →</span>
        </a>
        <a href="Exercício 3/exercicio3.html" class="bg-white/90 p-8 rounded-[2rem] shadow-2xl hover:scale-105 transition-all text-center">
            <h3 class="text-xl font-bold mb-2">Transporte Fretado</h3>
            <span class="text-purple-600 font-bold text-sm uppercase">Abrir Módulo →</span>
        </a>
    </div>
    <script>
        function clock() {
            document.getElementById('data-hora-main').innerText = new Date().toLocaleString('pt-BR');
        }
        setInterval(clock, 1000); clock();
    </script>
</body>
</html>
